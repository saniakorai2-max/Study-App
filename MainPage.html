<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forever</title>
    <link rel="stylesheet" href="MainPageStyle.css">
</head>
<body>
    <div class="content">

        <div class="top-bar">
            <h1>Welcome to Forever</h1>
            <p>Todays Date</p>
        </div>


        <div class="TotalTime">
            <div>
                <p>Today</p>
                <i class="fas fa-clock"></i>
            </div>
            <h3>0 hours 0 minutes</h3>
        </div>


        <div class="Subjects">
            <h2>Subjects</h2>
            <div class="subject-list">
                <div class="math">
                    <h3>Math</h3>
                    <p>0 hours 0 minutes</p>
                </div>
                <div class="physics">
                    <h3>Physics</h3>
                    <p>0 hours 0 minutes</p>
                </div>
                <div class="IT">
                    <h3>Information Technology</h3>
                    <p>0 hours 0 minutes</p>
                </div>
                <div class="add">
                    <i class="fa-solid fa-plus"></i>
            </div>

        </div>
    </div>

    <script src="https://kit.fontawesome.com/1442636567.js" crossorigin="anonymous"></script>
</body>
</html>
